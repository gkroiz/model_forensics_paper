    <text x="500" y="250" text-anchor="middle" dominant-baseline="central" style="font-size: 22px;fill:rgb(113, 43, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:17.6px;font-weight:500;text-anchor:middle;dominant-baseline:central">B. Add workaround</text>
